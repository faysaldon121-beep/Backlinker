name: Ping Backlink URLs

on:
  workflow_dispatch:          # manual trigger only (to avoid abuse)
  # schedule:                 # optional: uncomment to run daily at 2 AM
  #   - cron: '0 2 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backlink pinger
        run: node backlink-requester.js

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinger-logs
          path: |
            *.log
            # if you save logs, add them here
