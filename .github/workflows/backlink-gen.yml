name: Generate Backlinks

on:
  # Run on every push to main (or master)
  push:
    branches: [ main, master ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
  # Optional: run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backlink generator script
        run: |
          cat > backlinkGen.js << 'EOF'
          import { writeFile } from 'fs/promises';

          const JSON_URL = 'https://raw.githubusercontent.com/faysaldon121-beep/Backlinker/master/urlbacklinks.json';
          const HTML_OUTPUT = 'generated_backlinks.html';
          const TXT_OUTPUT = 'backlinks.txt';

          async function fetchBacklinkData() {
            const response = await fetch(JSON_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!Array.isArray(data)) throw new Error('JSON is not an array');
            return data;
          }

          function extractUrls(data) {
            const urls = [];
            for (const item of data) {
              if (typeof item === 'string' && item.startsWith('http')) {
                urls.push(item);
              } else if (typeof item === 'object' && item !== null) {
                const url = item.url || item.link;
                if (url && typeof url === 'string' && url.startsWith('http')) urls.push(url);
              }
            }
            if (urls.length === 0) throw new Error('No valid URLs found');
            return urls;
          }

          function generateHtmlBacklinks(urls) {
            const linkItems = urls.map(url => {
              let domain = url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
              if (domain.length > 50) domain = domain.substring(0, 47) + '...';
              return `    <li><a href="${url}" target="_blank" rel="noopener noreferrer">${domain}</a><br><small>${url}</small></li>`;
            }).join('\n');

            return `<!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><title>Generated Backlinks</title>
          <style>body{font-family:Arial;max-width:900px;margin:2rem auto;padding:0 1rem;} li{margin-bottom:1rem;padding:0.5rem;background:#f8f9fa;border-radius:6px;} a{color:#3498db;}</style>
          </head>
          <body>
          <h1>Backlinks (${urls.length})</h1>
          <ul>${linkItems}</ul>
          </body></html>`;
          }

          function generateTextBacklinks(urls) {
            return urls.join('\n');
          }

          async function main() {
            try {
              const data = await fetchBacklinkData();
              const urls = extractUrls(data);
              console.log(`Found ${urls.length} backlinks.`);
              await writeFile(HTML_OUTPUT, generateHtmlBacklinks(urls));
              await writeFile(TXT_OUTPUT, generateTextBacklinks(urls));
              console.log('Files written successfully.');
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          }
          main();
          EOF

      - name: Run backlink generator
        run: node backlinkGen.js

      - name: Upload generated files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backlinks-output
          path: |
            generated_backlinks.html
            backlinks.txt

      # (Optional) Commit and push changes back to the repository
      - name: Commit and push (optional)
        if: false   # Set to 'true' to enable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated_backlinks.html backlinks.txt
          git diff --staged --quiet || git commit -m "Update backlinks [skip ci]"
          git push
